<svg xmlns="http://www.w3.org/2000/svg" width="360" height="780" viewBox="0 0 360 780" role="img" aria-labelledby="title desc">
  <title id="title">Movie details screen preview</title>
  <desc id="desc">Static preview of the movie details screen with a large poster, rating, release date, and overview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#11263C"/>
      <stop offset="52%" stop-color="#0A1826"/>
      <stop offset="100%" stop-color="#000409"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#335F8B"/>
      <stop offset="100%" stop-color="#182A3E"/>
    </linearGradient>
  </defs>
  <rect width="360" height="780" rx="36" fill="#050A10"/>
  <rect x="10" y="10" width="340" height="760" rx="30" fill="url(#bg)"/>
  <text x="32" y="64" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="28">‹</text>
  <text x="315" y="64" text-anchor="middle" fill="#FF2D3F" font-family="Arial, sans-serif" font-size="24">♥</text>

  <rect x="40" y="92" width="280" height="388" rx="14" fill="url(#poster)"/>
  <text x="180" y="300" text-anchor="middle" fill="#6E7C8C" font-family="Arial, sans-serif" font-size="54">?</text>

  <text x="32" y="532" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">The Dark Knight</text>
  <text x="32" y="570" fill="#43A7FF" font-family="Arial, sans-serif" font-size="22" font-weight="700">★ 8.5</text>
  <text x="32" y="604" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="17">Release date: 2008-07-18</text>

  <text x="32" y="655" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="23" font-weight="700">Overview</text>
  <text x="32" y="686" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="16">A focused details page keeps the</text>
  <text x="32" y="710" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="16">poster, rating, date, and summary</text>
  <text x="32" y="734" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="16">easy to scan.</text>
</svg>
