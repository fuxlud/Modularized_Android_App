<svg xmlns="http://www.w3.org/2000/svg" width="360" height="780" viewBox="0 0 360 780" role="img" aria-labelledby="title desc">
  <title id="title">Favorites screen preview</title>
  <desc id="desc">Static preview of the Movies app favorites screen showing saved movies in a grid.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#11263C"/>
      <stop offset="48%" stop-color="#0A1826"/>
      <stop offset="100%" stop-color="#000409"/>
    </linearGradient>
    <linearGradient id="poster" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#27496B"/>
      <stop offset="100%" stop-color="#16283C"/>
    </linearGradient>
  </defs>
  <rect width="360" height="780" rx="36" fill="#050A10"/>
  <rect x="10" y="10" width="340" height="760" rx="30" fill="url(#bg)"/>
  <text x="24" y="82" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Favorites</text>

  <g transform="translate(24 122)">
    <g>
      <rect width="92" height="128" rx="12" fill="url(#poster)"/>
      <text x="46" y="72" text-anchor="middle" fill="#6E7C8C" font-family="Arial, sans-serif" font-size="30">?</text>
      <circle cx="76" cy="17" r="13" fill="#00050A" opacity="0.55"/>
      <text x="76" y="22" text-anchor="middle" fill="#FF2D3F" font-family="Arial, sans-serif" font-size="18">♥</text>
      <text x="0" y="154" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="700">The Dark Knight</text>
      <text x="0" y="178" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="15">★ 8.5</text>
    </g>
    <g transform="translate(104 0)">
      <rect width="92" height="128" rx="12" fill="url(#poster)"/>
      <text x="46" y="72" text-anchor="middle" fill="#6E7C8C" font-family="Arial, sans-serif" font-size="30">?</text>
      <circle cx="76" cy="17" r="13" fill="#00050A" opacity="0.55"/>
      <text x="76" y="22" text-anchor="middle" fill="#FF2D3F" font-family="Arial, sans-serif" font-size="18">♥</text>
      <text x="0" y="154" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="700">Interstellar</text>
      <text x="0" y="178" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="15">★ 8.7</text>
    </g>
    <g transform="translate(208 0)">
      <rect width="92" height="128" rx="12" fill="url(#poster)"/>
      <text x="46" y="72" text-anchor="middle" fill="#6E7C8C" font-family="Arial, sans-serif" font-size="30">?</text>
      <circle cx="76" cy="17" r="13" fill="#00050A" opacity="0.55"/>
      <text x="76" y="22" text-anchor="middle" fill="#FF2D3F" font-family="Arial, sans-serif" font-size="18">♥</text>
      <text x="0" y="154" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="15" font-weight="700">Dune: Part Two</text>
      <text x="0" y="178" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="15">★ 8.1</text>
    </g>
  </g>

  <rect x="52" y="424" width="256" height="96" rx="20" fill="#00050A" opacity="0.26"/>
  <text x="180" y="463" text-anchor="middle" fill="#D9DDE5" font-family="Arial, sans-serif" font-size="18" font-weight="700">Saved movies stay here</text>
  <text x="180" y="493" text-anchor="middle" fill="#9BA8B8" font-family="Arial, sans-serif" font-size="14">Tap a heart to remove one.</text>

  <rect x="38" y="700" width="284" height="52" rx="26" fill="#00050A" opacity="0.86"/>
  <text x="111" y="731" text-anchor="middle" fill="#9BA8B8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Discover</text>
  <rect x="189" y="708" width="112" height="36" rx="18" fill="#173756" opacity="0.8"/>
  <text x="245" y="731" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="13" font-weight="700">Favorites</text>
</svg>
